name: Secret scan (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          GL_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan PR diff only
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Scanning commits ${BASE_SHA}..${HEAD_SHA}"
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --report-format sarif \
            --report-path gitleaks-pr.sarif \
            --exit-code 1
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-pr-sarif
          path: gitleaks-pr.sarif
          if-no-files-found: ignore
