version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      types:
        patterns: ["@types/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      playwright:
        patterns: ["playwright", "@playwright/*"]
