name: Bug report
description: Something does not work as expected.
title: "[bug] "
labels: [bug, audit]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence — what is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. expected: ... / actual: ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, runtime version, browser, headless flag, ...
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
